<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voûtix — Partagez. En toute sécurité.</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06080f;--bg2:#0c1018;--bg3:#111620;--bg4:#161d2a;
  --border:#1a2235;--accent:#3dffa0;--accent2:#4a9eff;--danger:#ff4757;--warn:#ffaa00;
  --text:#e8eeff;--muted:#4a5568;--mutedL:#718096;
  --mono:'DM Mono',monospace;--serif:'Instrument Serif',serif;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
input,select,textarea{outline:none;font-family:var(--sans);}
button{cursor:pointer;font-family:var(--sans);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(61,255,160,0.06) 0%,transparent 60%);}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center;}
.auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.auth-logo-text{font-family:var(--serif);font-size:28px;font-style:italic;}
.auth-title{font-weight:800;font-size:22px;margin-bottom:6px;text-align:center;}
.auth-sub{color:var(--mutedL);font-size:14px;text-align:center;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;transition:border 0.2s;}
.field input:focus{border-color:var(--accent);}
.btn{padding:12px 24px;border-radius:9px;border:none;font-weight:700;font-size:14px;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:#06080f;}
.btn-primary:hover{background:#5fffc0;transform:translateY(-1px);box-shadow:0 8px 20px rgba(61,255,160,0.2);}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--mutedL);}
.btn-danger{background:rgba(255,71,87,0.12);color:var(--danger);border:1px solid rgba(255,71,87,0.3);}
.btn-danger:hover{background:rgba(255,71,87,0.2);}
.btn-full{width:100%;}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--mutedL);}
.auth-switch a{color:var(--accent);text-decoration:none;font-weight:600;}
.err{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;}
.ok{background:rgba(61,255,160,0.1);border:1px solid rgba(61,255,160,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--accent);margin-bottom:16px;}

/* APP LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.sidebar-logo-text{font-family:var(--serif);font-size:20px;font-style:italic;}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:12px 8px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--mutedL);cursor:pointer;transition:all 0.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--bg4);color:var(--accent);font-weight:600;}
.nav-item .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-user{padding:14px 16px;border-top:1px solid var(--border);}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.user-avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#06080f;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* MAIN */
.main{margin-left:220px;flex:1;padding:28px;min-height:100vh;}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.page-title{font-family:var(--serif);font-size:28px;font-style:italic;}
.page-sub{color:var(--mutedL);font-size:13px;margin-top:2px;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-num{font-size:30px;font-weight:800;font-family:var(--mono);margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.07em;text-transform:uppercase;}

/* FILE LIST */
.file-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.file-row:hover{border-color:rgba(61,255,160,0.3);background:var(--bg3);transform:translateX(2px);}
.file-icon{font-size:24px;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px;}
.file-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--mono);}
.badge-green{background:rgba(61,255,160,0.1);color:var(--accent);border:1px solid rgba(61,255,160,0.25);}
.badge-blue{background:rgba(74,158,255,0.1);color:var(--accent2);border:1px solid rgba(74,158,255,0.25);}
.badge-red{background:rgba(255,71,87,0.1);color:var(--danger);border:1px solid rgba(255,71,87,0.25);}
.badge-warn{background:rgba(255,170,0,0.1);color:var(--warn);border:1px solid rgba(255,170,0,0.25);}
.badge-gray{background:var(--bg3);color:var(--mutedL);border:1px solid var(--border);}
.progress{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.3s;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:popIn 0.2s ease;}
@keyframes popIn{from{transform:scale(0.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-weight:800;font-size:18px;margin-bottom:4px;}
.modal-sub{color:var(--mutedL);font-size:13px;margin-bottom:24px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:16px;}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(61,255,160,0.04);}
.drop-zone-icon{font-size:32px;margin-bottom:8px;}
.drop-zone-text{font-weight:600;font-size:14px;margin-bottom:4px;}
.drop-zone-sub{font-size:12px;color:var(--muted);}

/* TOGGLE */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg3);border-radius:9px;margin-bottom:12px;}
.toggle-label{font-weight:600;font-size:14px;}
.toggle-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.toggle{width:42px;height:24px;border-radius:12px;border:1px solid var(--border);background:var(--bg4);position:relative;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.toggle.on{background:rgba(61,255,160,0.15);border-color:var(--accent);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--muted);transition:all 0.2s;}
.toggle.on .toggle-thumb{left:21px;background:var(--accent);}

/* NOTIF */
.notif{position:fixed;top:20px;right:20px;z-index:999;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13px;animation:slideIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* LOG TABLE */
.log-table{width:100%;border-collapse:collapse;}
.log-table th{text-align:left;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border);}
.log-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);}
.log-table tr:last-child td{border-bottom:none;}
.log-table tr:hover td{background:var(--bg3);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-weight:700;font-size:16px;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:13px;line-height:1.6;}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;}
  .main{margin-left:0;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ─── SUPABASE INIT ────────────────────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(
  'https://roxscufmzlsfalkmwvrd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJveHNjdWZtemxzZmFsa213dnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDMzNzMsImV4cCI6MjA4Nzg3OTM3M30.srloz63U_OwdRWlz_mHGYLPvM22k3Xt5HMdpuAtEyd4'
);

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function ago(t){const d=(Date.now()-new Date(t))/60000;if(d<1)return"à l'instant";if(d<60)return`${Math.floor(d)}m`;if(d<1440)return`${Math.floor(d/60)}h`;return`${Math.floor(d/1440)}j`;}
function timeLeft(exp){const d=new Date(exp)-Date.now();if(d<=0)return{label:"Expiré",expired:true};const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000);return{label:h>24?`${Math.floor(h/24)}j ${h%24}h`:h>0?`${h}h ${m}m`:`${m}m`,expired:false};}
function fmtSize(b){if(!b)return"—";if(b<1024)return`${b}B`;if(b<1048576)return`${(b/1024).toFixed(1)}KB`;return`${(b/1048576).toFixed(1)}MB`;}
function fileIcon(t){return{pdf:"📄",doc:"📝",docx:"📝",zip:"📦",pptx:"📊",xlsx:"📊",png:"🖼️",jpg:"🖼️",jpeg:"🖼️",mp4:"🎬",mp3:"🎵"}[t]||"📁";}
function genToken(){return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,"0")).join("");}

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  user: null, profile: null, session: null,
  page: 'dashboard',
  files: [], departments: [], logs: [],
  loading: true, uploading: false, uploadPct: 0,
  modal: null, // 'upload' | 'dept' | 'detail'
  selectedFile: null,
  notif: null,
  authMode: 'login', // 'login' | 'register'
  authLoading: false, authErr: null, authOk: null,
  newFile: { name:'', expiry:'24', maxDl:'10', encrypt:true, deptId:'', file:null },
  newDept: { name:'', icon:'🏢', external:false },
};

function setState(patch){ Object.assign(state, typeof patch==='function'?patch(state):patch); render(); }
function notify(msg, type='success'){ setState({notif:{msg,type}}); setTimeout(()=>setState({notif:null}),3500); }

// ─── SUPABASE CALLS ───────────────────────────────────────────────────────────
async function loadData(){
  if(!state.user) return;
  setState({loading:true});
  try{
    const [fRes, dRes, lRes] = await Promise.all([
      sb.from('shared_files').select('*, departments(name,icon,color,external)').eq('owner_id',state.user.id).order('created_at',{ascending:false}),
      sb.from('departments').select('*').eq('owner_id',state.user.id).order('created_at'),
      sb.from('access_logs').select('*, shared_files(file_name)').in('file_id', (await sb.from('shared_files').select('id').eq('owner_id',state.user.id)).data?.map(f=>f.id)||[]).order('created_at',{ascending:false}).limit(50)
    ]);
    setState({ files: fRes.data||[], departments: dRes.data||[], logs: lRes.data||[], loading:false });
  } catch(e){ setState({loading:false}); }
}

async function signIn(email, password){
  setState({authLoading:true, authErr:null});
  const {data, error} = await sb.auth.signInWithPassword({email, password});
  if(error){ setState({authLoading:false, authErr:error.message}); return; }
  setState({authLoading:false});
}

async function signUp(email, password, name){
  setState({authLoading:true, authErr:null});
  const {data, error} = await sb.auth.signUp({email, password, options:{data:{full_name:name}}});
  if(error){ setState({authLoading:false, authErr:error.message}); return; }
  setState({authLoading:false, authOk:"Compte créé ! Vérifiez votre email pour confirmer."});
}

async function signOut(){ await sb.auth.signOut(); setState({user:null,profile:null,files:[],departments:[],logs:[]}); }

async function uploadFile(){
  const {file, name, expiry, maxDl, encrypt, deptId} = state.newFile;
  if(!file && !name){ notify("Sélectionnez un fichier","error"); return; }
  const f = file;
  const fileName = f ? f.name : name;
  const ext = fileName.split('.').pop().toLowerCase();
  const storagePath = `${state.user.id}/${Date.now()}_${fileName}`;
  setState({uploading:true, uploadPct:5});

  try{
    // Upload réel vers Supabase Storage
    if(f){
      const {error:upErr} = await sb.storage.from('voutix-files').upload(storagePath, f, {upsert:true});
      if(upErr) throw upErr;
    }
    setState({uploadPct:60});

    const expiresAt = new Date(Date.now()+3600000*parseInt(expiry)).toISOString();
    const {error:dbErr} = await sb.from('shared_files').insert({
      owner_id: state.user.id,
      department_id: deptId||null,
      file_name: fileName,
      file_size: f?.size||0,
      file_type: ext,
      storage_path: f ? storagePath : 'manual',
      encrypted: encrypt,
      enc_key_hint: encrypt ? genToken().slice(0,8)+'...' : null,
      expires_at: expiresAt,
      max_downloads: parseInt(maxDl),
      share_token: genToken(),
    });
    if(dbErr) throw dbErr;

    setState({uploadPct:100, uploading:false, modal:null, newFile:{name:'',expiry:'24',maxDl:'10',encrypt:true,deptId:'',file:null}});
    notify("Fichier partagé avec succès !");
    await loadData();
  } catch(e){
    setState({uploading:false, uploadPct:0});
    notify(e.message,"error");
  }
}

async function revokeFile(id){
  const f = state.files.find(x=>x.id===id);
  if(f?.storage_path && f.storage_path!=='manual'){
    await sb.storage.from('voutix-files').remove([f.storage_path]);
  }
  await sb.from('shared_files').delete().eq('id',id);
  setState({selectedFile:null, modal:null});
  notify("Partage révoqué");
  await loadData();
}

async function createDept(){
  if(!state.newDept.name){ notify("Nom requis","error"); return; }
  const colors=['#3dffa0','#4a9eff','#ffaa00','#ff6b9d','#a78bfa','#fb923c'];
  const {error} = await sb.from('departments').insert({
    owner_id: state.user.id,
    name: state.newDept.name,
    icon: state.newDept.icon,
    color: colors[Math.floor(Math.random()*colors.length)],
    external: state.newDept.external,
  });
  if(error){ notify(error.message,"error"); return; }
  setState({modal:null, newDept:{name:'',icon:'🏢',external:false}});
  notify("Département créé !");
  await loadData();
}

async function copyLink(token){
  const url = `${location.origin}${location.pathname}?share=${token}`;
  try{ await navigator.clipboard.writeText(url); } catch(e){}
  notify("Lien copié !");
}

// ─── AUTH LISTENER ────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if(session?.user){
    const {data:profile} = await sb.from('profiles').select('*').eq('id',session.user.id).single();
    setState({user:session.user, profile, session, loading:false});
    await loadData();
  } else {
    setState({user:null, profile:null, session:null, loading:false});
  }
});

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const root = document.getElementById('root');
  if(state.loading && !state.user){ root.innerHTML=renderLoading(); return; }
  if(!state.user){ root.innerHTML=renderAuth(); bindAuth(); return; }
  root.innerHTML=renderApp();
  bindApp();
}

function renderLoading(){
  return `<div class="loading"><div class="spinner"></div>Chargement de Voûtix…</div>`;
}

function renderAuth(){
  const isLogin = state.authMode==='login';
  return `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🔐</div>
        <div class="auth-logo-text">Voûtix</div>
      </div>
      ${state.authErr?`<div class="err">⚠ ${state.authErr}</div>`:''}
      ${state.authOk?`<div class="ok">✓ ${state.authOk}</div>`:''}
      <div class="auth-title">${isLogin?'Connexion':'Créer un compte'}</div>
      <div class="auth-sub">${isLogin?'Accédez à votre espace Voûtix':'Rejoignez Voûtix gratuitement'}</div>
      ${!isLogin?`<div class="field"><label>Nom complet</label><input id="auth-name" type="text" placeholder="Jean Dupont"/></div>`:''}
      <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="vous@entreprise.com"/></div>
      <div class="field"><label>Mot de passe</label><input id="auth-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary btn-full" id="auth-submit" ${state.authLoading?'disabled':''}>
        ${state.authLoading?'Chargement…':isLogin?'Se connecter →':'Créer mon compte →'}
      </button>
      <div class="auth-switch">
        ${isLogin?`Pas encore de compte ? <a href="#" id="auth-toggle">Créer un compte</a>`:`Déjà un compte ? <a href="#" id="auth-toggle">Se connecter</a>`}
      </div>
    </div>
  </div>`;
}

function bindAuth(){
  document.getElementById('auth-submit')?.addEventListener('click', ()=>{
    const email = document.getElementById('auth-email')?.value;
    const pass = document.getElementById('auth-pass')?.value;
    if(state.authMode==='login') signIn(email,pass);
    else{ const name=document.getElementById('auth-name')?.value; signUp(email,pass,name); }
  });
  document.getElementById('auth-toggle')?.addEventListener('click', e=>{
    e.preventDefault();
    setState({authMode:state.authMode==='login'?'register':'login',authErr:null,authOk:null});
  });
  // Enter key
  document.querySelectorAll('#auth-email,#auth-pass').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('auth-submit')?.click(); });
  });
}

function renderApp(){
  const s = state;
  const initials = s.profile?.full_name?.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || s.user?.email?.[0]?.toUpperCase() || '?';

  return `
  ${s.notif?`<div class="notif" style="background:${s.notif.type==='error'?'var(--danger)':'var(--accent)'};color:${s.notif.type==='error'?'#fff':'#06080f'}">
    ${s.notif.type==='error'?'⚠ ':'✓ '}${s.notif.msg}
  </div>`:''}
  ${s.modal?renderModal():''}
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🔐</div>
        <div class="sidebar-logo-text">Voûtix</div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section">Principal</div>
        ${navItem('dashboard','◈','Tableau de bord')}
        ${navItem('files','📁','Mes fichiers')}
        ${navItem('logs','📋','Journal d\'accès')}
        <div class="nav-section">Organisation</div>
        ${navItem('departments','🏢','Départements')}
        <div class="nav-section">Compte</div>
        ${navItem('settings','⚙️','Paramètres')}
      </div>
      <div class="sidebar-user">
        <div class="user-info">
          <div class="user-avatar">${initials}</div>
          <div style="min-width:0">
            <div class="user-name">${s.profile?.full_name||'Utilisateur'}</div>
            <div class="user-email">${s.user?.email||''}</div>
          </div>
        </div>
        <button class="btn btn-ghost" style="width:100%;padding:8px;font-size:12px;" id="btn-signout">Déconnexion</button>
      </div>
    </div>
    <div class="main">
      ${renderPage()}
    </div>
  </div>`;
}

function navItem(page, icon, label){
  return `<button class="nav-item ${state.page===page?'active':''}" data-page="${page}"><span class="ni">${icon}</span>${label}</button>`;
}

function renderPage(){
  if(state.loading) return `<div class="loading"><div class="spinner"></div>Chargement…</div>`;
  switch(state.page){
    case 'dashboard': return renderDashboard();
    case 'files': return renderFiles();
    case 'logs': return renderLogs();
    case 'departments': return renderDepartments();
    case 'settings': return renderSettings();
    default: return renderDashboard();
  }
}

function renderDashboard(){
  const active = state.files.filter(f=>!timeLeft(f.expires_at).expired).length;
  const enc = state.files.filter(f=>f.encrypted).length;
  const totalDl = state.files.reduce((s,f)=>s+f.download_count,0);
  return `
  <div class="page-header">
    <div><div class="page-title">Tableau de bord</div><div class="page-sub">Bienvenue, ${state.profile?.full_name?.split(' ')[0]||'utilisateur'} 👋</div></div>
    <button class="btn btn-primary" id="btn-open-upload">+ Nouveau partage</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${active}</div><div class="stat-label">◉ Partages actifs</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent2)">${state.files.length}</div><div class="stat-label">◈ Total fichiers</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${enc}</div><div class="stat-label">🔒 Chiffrés</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--mutedL)">${totalDl}</div><div class="stat-label">◎ Téléchargements</div></div>
  </div>
  <div class="card">
    <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:14px">Partages récents</div>
    ${state.files.length===0?`<div class="empty"><div class="empty-icon">📁</div><div class="empty-title">Aucun fichier partagé</div><div class="empty-sub">Cliquez sur "+ Nouveau partage" pour commencer</div></div>`:
    state.files.slice(0,5).map(f=>renderFileRow(f)).join('')}
  </div>`;
}

function renderFiles(){
  return `
  <div class="page-header">
    <div><div class="page-title">Mes fichiers</div><div class="page-sub">${state.files.length} fichier(s) partagé(s)</div></div>
    <button class="btn btn-primary" id="btn-open-upload">+ Nouveau partage</button>
  </div>
  <div class="card">
    ${state.files.length===0?`<div class="empty"><div class="empty-icon">📂</div><div class="empty-title">Aucun fichier</div><div class="empty-sub">Partagez votre premier fichier sécurisé</div></div>`:
    state.files.map(f=>renderFileRow(f,true)).join('')}
  </div>`;
}

function renderFileRow(f, showActions=false){
  const tl = timeLeft(f.expires_at);
  const dept = f.departments;
  const pct = Math.min(100,(f.download_count/Math.max(1,f.max_downloads))*100);
  return `
  <div class="file-row" data-file-id="${f.id}">
    <div class="file-icon">${fileIcon(f.file_type)}</div>
    <div class="file-info">
      <div class="file-name">${f.file_name}</div>
      <div class="file-meta">
        ${dept?`<span class="badge" style="background:${dept.color}18;color:${dept.color};border:1px solid ${dept.color}33">${dept.icon} ${dept.name}</span>`:''}
        ${f.encrypted?`<span class="badge badge-green">🔒 AES-256</span>`:''}
        <span class="badge ${tl.expired?'badge-red':'badge-warn'}">${tl.label}</span>
        <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${f.download_count}/${f.max_downloads} DL · ${fmtSize(f.file_size)}</span>
      </div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${pct>=100?'var(--danger)':pct>70?'var(--warn)':undefined}"></div></div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" data-copy="${f.share_token}">🔗 Lien</button>
      ${showActions?`<button class="btn btn-danger" style="padding:6px 10px;font-size:12px" data-revoke="${f.id}">🗑</button>`:''}
    </div>
  </div>`;
}

function renderLogs(){
  return `
  <div class="page-header">
    <div><div class="page-title">Journal d'accès</div><div class="page-sub">${state.logs.length} événement(s) enregistré(s)</div></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    ${state.logs.length===0?`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Aucun accès enregistré</div></div>`:`
    <table class="log-table">
      <thead><tr><th>Action</th><th>Fichier</th><th>IP</th><th>Localisation</th><th>Risque</th><th>Heure</th></tr></thead>
      <tbody>
        ${state.logs.map(l=>`
        <tr>
          <td><span class="badge ${l.action==='downloaded'?'badge-blue':'badge-green'}">${l.action==='downloaded'?'⬇ Téléchargé':'👁 Consulté'}</span></td>
          <td style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.shared_files?.file_name||'—'}</td>
          <td style="font-family:var(--mono);font-size:12px">${l.ip_address||'—'}</td>
          <td style="font-size:12px;color:var(--mutedL)">${l.location||'—'}</td>
          <td><span class="badge ${l.risk_level==='suspect'?'badge-red':l.risk_level==='blocked'?'badge-warn':'badge-green'}">${l.risk_level||'normal'}</span></td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${ago(l.created_at)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`}
  </div>`;
}

function renderDepartments(){
  return `
  <div class="page-header">
    <div><div class="page-title">Départements</div><div class="page-sub">${state.departments.length} département(s)</div></div>
    <button class="btn btn-primary" id="btn-open-dept">+ Nouveau</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
    ${state.departments.map(d=>{
      const dFiles=state.files.filter(f=>f.department_id===d.id);
      return `
      <div class="card" style="border-color:${d.color}22">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div style="font-size:28px;margin-bottom:6px">${d.icon}</div>
          <span class="badge ${d.external?'badge-blue':'badge-green'}">${d.external?'🌐 Externe':'🏢 Interne'}</span>
        </div>
        <div style="font-weight:700;font-size:16px;margin-bottom:4px">${d.name}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
          <div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:20px;font-weight:800;color:${d.color};font-family:var(--mono)">${dFiles.length}</div>
            <div style="font-size:10px;color:var(--muted)">Fichiers</div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:20px;font-weight:800;color:${d.color};font-family:var(--mono)">${dFiles.filter(f=>!timeLeft(f.expires_at).expired).length}</div>
            <div style="font-size:10px;color:var(--muted)">Actifs</div>
          </div>
        </div>
      </div>`;
    }).join('')}
    <div class="card" style="border-style:dashed;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;text-align:center" id="btn-open-dept-2">
      <div style="font-size:32px;margin-bottom:8px">+</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">Nouveau département</div>
      <div style="font-size:12px;color:var(--muted)">Interne ou inter-entreprise</div>
    </div>
  </div>`;
}

function renderSettings(){
  return `
  <div class="page-header">
    <div><div class="page-title">Paramètres</div><div class="page-sub">Gérez votre compte Voûtix</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:700px">
    <div class="card">
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:16px">Informations du compte</div>
      <div style="margin-bottom:12px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px">EMAIL</div>
        <div style="font-size:14px;font-family:var(--mono)">${state.user?.email}</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px">NOM</div>
        <div style="font-size:14px">${state.profile?.full_name||'—'}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px">MEMBRE DEPUIS</div>
        <div style="font-size:14px;font-family:var(--mono)">${state.profile?.created_at?new Date(state.profile.created_at).toLocaleDateString('fr-CA'):'—'}</div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:16px">Statistiques</div>
      ${[
        ['Fichiers partagés', state.files.length],
        ['Partages actifs', state.files.filter(f=>!timeLeft(f.expires_at).expired).length],
        ['Départements', state.departments.length],
        ['Accès enregistrés', state.logs.length],
      ].map(([k,v])=>`
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;color:var(--mutedL)">${k}</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--accent)">${v}</span>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderModal(){
  switch(state.modal){
    case 'upload': return renderUploadModal();
    case 'dept': return renderDeptModal();
    default: return '';
  }
}

function renderUploadModal(){
  const s = state;
  return `
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">Nouveau partage sécurisé</div>
      <div class="modal-sub">Chiffrement AES-256 · Lien temporaire</div>
      <div class="drop-zone ${s.newFile.file?'over':''}" id="drop-zone">
        <div class="drop-zone-icon">${s.newFile.file?'✅':'📁'}</div>
        <div class="drop-zone-text">${s.newFile.file?s.newFile.file.name:'Glisser-déposer ou cliquer'}</div>
        <div class="drop-zone-sub">${s.newFile.file?fmtSize(s.newFile.file.size):'Tous types de fichiers'}</div>
        <input type="file" id="file-input" style="display:none"/>
      </div>
      <div class="field">
        <label>Département (optionnel)</label>
        <select id="nf-dept" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px">
          <option value="">— Aucun département —</option>
          ${s.departments.map(d=>`<option value="${d.id}" ${s.newFile.deptId===d.id?'selected':''}>${d.icon} ${d.name}</option>`).join('')}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="field" style="margin:0">
          <label>Expiration</label>
          <select id="nf-expiry" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px">
            <option value="1">1 heure</option>
            <option value="6">6 heures</option>
            <option value="24" selected>24 heures</option>
            <option value="72">3 jours</option>
            <option value="168">7 jours</option>
            <option value="336">14 jours</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Max téléchargements</label>
          <select id="nf-maxdl" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px">
            <option value="1">1×</option>
            <option value="3">3×</option>
            <option value="5">5×</option>
            <option value="10" selected>10×</option>
            <option value="999">Illimité</option>
          </select>
        </div>
      </div>
      <div class="toggle-row">
        <div><div class="toggle-label">🔒 Chiffrement AES-256-GCM</div><div class="toggle-sub">Clé unique zero-knowledge</div></div>
        <div class="toggle ${s.newFile.encrypt?'on':''}" id="toggle-enc"><div class="toggle-thumb"></div></div>
      </div>
      ${s.uploading?`
        <div style="margin-bottom:4px;display:flex;justify-content:space-between;font-size:13px">
          <span>Chiffrement & envoi…</span>
          <span style="font-family:var(--mono);color:var(--accent)">${Math.min(100,Math.round(s.uploadPct))}%</span>
        </div>
        <div class="progress" style="height:6px"><div class="progress-fill" style="width:${s.uploadPct}%"></div></div>
      `:`
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel" style="flex:1">Annuler</button>
        <button class="btn btn-primary" id="btn-upload" style="flex:2">🔐 Chiffrer & Partager</button>
      </div>`}
    </div>
  </div>`;
}

function renderDeptModal(){
  const s = state;
  return `
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">Nouveau département</div>
      <div class="modal-sub">Interne ou inter-entreprise</div>
      <div class="field"><label>Nom du département</label><input id="dept-name" type="text" placeholder="Ex: Marketing" value="${s.newDept.name}"/></div>
      <div class="field"><label>Icône (emoji)</label><input id="dept-icon" type="text" placeholder="🏢" value="${s.newDept.icon}" style="font-size:20px;width:80px"/></div>
      <div class="toggle-row">
        <div><div class="toggle-label">🌐 Accès externe</div><div class="toggle-sub">Partenaires inter-entreprise</div></div>
        <div class="toggle ${s.newDept.external?'on':''}" id="toggle-ext"><div class="toggle-thumb"></div></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel" style="flex:1">Annuler</button>
        <button class="btn btn-primary" id="btn-create-dept" style="flex:2">Créer →</button>
      </div>
    </div>
  </div>`;
}

// ─── BIND ─────────────────────────────────────────────────────────────────────
function bindApp(){
  // Navigation
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.addEventListener('click',()=>setState({page:el.dataset.page}));
  });

  // Sign out
  document.getElementById('btn-signout')?.addEventListener('click', signOut);

  // Open upload modal
  document.getElementById('btn-open-upload')?.addEventListener('click',()=>setState({modal:'upload'}));

  // Open dept modal
  document.getElementById('btn-open-dept')?.addEventListener('click',()=>setState({modal:'dept'}));
  document.getElementById('btn-open-dept-2')?.addEventListener('click',()=>setState({modal:'dept'}));

  // Copy link buttons
  document.querySelectorAll('[data-copy]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); copyLink(el.dataset.copy); });
  });

  // Revoke buttons
  document.querySelectorAll('[data-revoke]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); if(confirm('Révoquer ce partage ?')) revokeFile(el.dataset.revoke); });
  });

  // Modal bindings
  if(state.modal==='upload') bindUploadModal();
  if(state.modal==='dept') bindDeptModal();

  // Close modal on overlay click
  document.getElementById('modal-overlay')?.addEventListener('click',e=>{
    if(e.target.id==='modal-overlay') setState({modal:null});
  });
}

function bindUploadModal(){
  // File input
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  dropZone?.addEventListener('click',()=>fileInput?.click());
  fileInput?.addEventListener('change',e=>{
    const f=e.target.files[0];
    if(f) setState(s=>({newFile:{...s.newFile,file:f,name:f.name}}));
  });
  dropZone?.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over');});
  dropZone?.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
  dropZone?.addEventListener('drop',e=>{
    e.preventDefault();
    const f=e.dataTransfer.files[0];
    if(f) setState(s=>({newFile:{...s.newFile,file:f,name:f.name}}));
  });

  // Selects
  document.getElementById('nf-dept')?.addEventListener('change',e=>setState(s=>({newFile:{...s.newFile,deptId:e.target.value}})));
  document.getElementById('nf-expiry')?.addEventListener('change',e=>setState(s=>({newFile:{...s.newFile,expiry:e.target.value}})));
  document.getElementById('nf-maxdl')?.addEventListener('change',e=>setState(s=>({newFile:{...s.newFile,maxDl:e.target.value}})));

  // Toggle
  document.getElementById('toggle-enc')?.addEventListener('click',()=>setState(s=>({newFile:{...s.newFile,encrypt:!s.newFile.encrypt}})));

  // Buttons
  document.getElementById('modal-cancel')?.addEventListener('click',()=>setState({modal:null}));
  document.getElementById('btn-upload')?.addEventListener('click',uploadFile);
}

function bindDeptModal(){
  document.getElementById('dept-name')?.addEventListener('input',e=>setState(s=>({newDept:{...s.newDept,name:e.target.value}})));
  document.getElementById('dept-icon')?.addEventListener('input',e=>setState(s=>({newDept:{...s.newDept,icon:e.target.value}})));
  document.getElementById('toggle-ext')?.addEventListener('click',()=>setState(s=>({newDept:{...s.newDept,external:!s.newDept.external}})));
  document.getElementById('modal-cancel')?.addEventListener('click',()=>setState({modal:null}));
  document.getElementById('btn-create-dept')?.addEventListener('click',createDept);
}

// ─── INITIAL RENDER ───────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
